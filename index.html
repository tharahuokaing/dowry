<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>កម្មវិធីពិសេស - ពិធីហែជំនូនមហាសិរីមង្គល</title>
    <link href="https://fonts.googleapis.com/css2?family=Moul&family=Hanuman:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="dowry-page-container">
        <div class="khmer-art-header">
            <img src="https://github.com/tharahuokaing/weeding/blob/main/weeding.png?raw=true" alt="Wedding Ornament Header">
        </div>

        <h1 class="page-title-moul">សូមស្វាគមន៍មកកាន់</h1>
        <h2 class="page-subtitle-moul">ទិដ្ឋភាព និងតន្ត្រី «ពិធីហែជំនូន»</h2>
        
        <p class="description-text">
            សូមចុចលើប៊ូតុងស្គរជ័យខាងក្រោម ដើម្បីស្តាប់តន្ត្រីភ្លេងការប្រពៃណីខ្មែរ ព្រមទាំងទស្សនារូបភាពដ៏ស្រស់ស្អាតនៃពិធីហែជំនូនក្នុងឱកាសសិរីមង្គលអាពាហ៍ពិពាហ៍។
        </p>

        <div class="action-wrapper">
            <button class="btn-play-dowry" onclick="startDowryCelebration()">
                🥁 ចូលទស្សនា និងស្តាប់ភ្លេងការហែជំនូន
            </button>
        </div>

        <div class="khmer-art-footer">
            <img src="https://github.com/tharahuokaing/weeding/blob/main/weeding_footer.png?raw=true" alt="Wedding Ornament Footer">
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
